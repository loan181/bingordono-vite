<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BinGordono</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap">
    <link rel="stylesheet" href="src/style.css">
    <script type="module" src="/src/bingoApp.js"></script>
</head>
<body x-data="bingoApp()" x-init="init()">

<div class="control-panel no-print">
    <label for="grid-count">Nombre de grilles:</label>
    <input type="number" id="grid-count" x-model.number="gridCount" min="1" max="1000">
    <button @click="generateGrids(gridCount)">Générer</button>
    <button @click="window.print()" :disabled="grids.length === 0">Imprimer</button>
    <a href="./wordlist.html" style="font-family:inherit;color:inherit;border:1px solid #8a6c5a;padding:0.4rem 0.8rem;text-decoration:none;font-size:0.9rem;">📜 Liste des mots</a>
</div>

<div id="bingo-container">
    <template x-for="(grid, gridIndex) in grids" :key="gridIndex">
        <div class="bingo-card">
            <div class="bingo-card-header" x-text="'BinGordono #' + (gridIndex + 1)"></div>
            <div class="bingo-grid-4x4">
                <template x-for="(word, i) in grid.words" :key="i">
                    <div class="bingo-cell" :style="getGridArea(i)" x-text="word"></div>
                </template>
                <div class="center-block">
                    <img src="/src/assets/logo_no-bg.png" alt="Logo Gordono">
                </div>
            </div>
            <div class="verse" x-text="grid.verse"></div>
        </div>
    </template>
</div>

</body>
</html>
