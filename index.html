<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BinGordono</title>
    <link rel="stylesheet" href="src/style.css">
    <script type="module" src="/src/bingoApp.js"></script>
</head>
<body x-data="bingoApp()" x-init="init()">

<div class="control-panel no-print">
    <label for="grid-count">Nombre de grilles:</label>
    <input type="number" id="grid-count" x-model.number="gridCount" min="1" max="1000">
    <button @click="generateGrids(gridCount)">Générer</button>
    <button @click="window.print()" :disabled="grids.length === 0">Imprimer</button>
</div>

<div id="bingo-container">
    <template x-for="(grid, gridIndex) in grids" :key="gridIndex">
        <div class="bingo-card">
            <div class="bingo-card-header" x-text="'BinGordono #' + (gridIndex + 1)"></div>
            <div class="bingo-grid-4x4">
                <template x-for="(word, i) in grid.words" :key="i">
                    <div class="bingo-cell" :style="getGridArea(i)">
                        <div class="cell-content">
                            <span x-text="word"></span>
                        </div>
                    </div>
                </template>
                <div class="center-block">
                </div>
            </div>
            <div class="verse" x-text="grid.verse"></div>
        </div>
    </template>
</div>

</body>
</html>
