<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BinGordono — Liste des Mots</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap">
    <script type="module" src="/src/wordlistApp.js"></script>
    <style>
        :root {
            --primary-color: #900090;
            --text-color: gold;
            --background-color: #1a0a1a;
            --card-bg: radial-gradient(ellipse at 30% 20%, #b000b0 0%, #700070 60%, #500050 100%);
            --border-color: gold;
            --font-family-main: 'MedievalSharp', cursive, sans-serif;
            --muted: rgba(255, 215, 0, 0.5);
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--font-family-main);
            background-color: var(--background-color);
            background-image:
                radial-gradient(ellipse at top, #3a003a 0%, #1a0a1a 60%);
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            color: var(--text-color);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.5rem;
            color: var(--text-color);
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            margin: 0 0 0.25rem;
            letter-spacing: 0.05em;
        }

        header p {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0 0 1rem;
        }

        .back-link {
            display: inline-block;
            color: var(--text-color);
            text-decoration: none;
            border: 1px solid var(--border-color);
            padding: 0.3rem 0.8rem;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .back-link:hover { background: rgba(255,215,0,0.15); }

        .search-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .search-bar input {
            font-family: var(--font-family-main);
            font-size: 1rem;
            padding: 0.5rem 1rem;
            width: 100%;
            max-width: 480px;
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--border-color);
            color: var(--text-color);
            outline: none;
        }
        .search-bar input::placeholder { color: var(--muted); }
        .search-bar input:focus { background: rgba(255,215,0,0.08); }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .tab-btn {
            font-family: var(--font-family-main);
            font-size: 0.85rem;
            padding: 0.4rem 0.9rem;
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .tab-btn:hover { color: var(--text-color); background: rgba(255,215,0,0.1); }
        .tab-btn.active { background: var(--primary-color); color: var(--text-color); border-color: var(--text-color); }

        .tab-btn .badge {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            border-radius: 999px;
            font-size: 0.7rem;
            padding: 0 0.4rem;
        }
        .tab-btn.active .badge { background: rgba(255,255,255,0.2); }

        /* Word grid */
        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.6rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .word-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.6rem 0.9rem;
            text-align: center;
            font-size: 0.95rem;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .word-card:hover {
            transform: translateY(-2px);
            box-shadow: 2px 6px 16px rgba(0,0,0,0.5);
        }

        .word-card.highlight {
            border-color: #ffdd00;
            box-shadow: 0 0 10px rgba(255,215,0,0.5);
        }

        .empty-state {
            text-align: center;
            color: var(--muted);
            font-size: 1.1rem;
            padding: 3rem;
            grid-column: 1 / -1;
        }

        .category-title {
            text-align: center;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            color: var(--text-color);
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .category-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            font-family: sans-serif;
        }
    </style>
</head>
<body x-data="wordlistApp()">

    <header>
        <h1>✦ BinGordono ✦</h1>
        <p>Compendium des Mots Sacrés</p>
        <a href="./" class="back-link">← Retour aux grilles</a>
    </header>

    <div class="search-bar">
        <input
            type="text"
            x-model="search"
            placeholder="Chercher un mot..."
            @input="onSearch()"
        />
    </div>

    <div class="tabs">
        <button
            class="tab-btn"
            :class="{ active: activeTab === 'all' }"
            @click="setTab('all')"
        >
            Tous
            <span class="badge" x-text="totalCount"></span>
        </button>
        <template x-for="cat in categories" :key="cat.key">
            <button
                class="tab-btn"
                :class="{ active: activeTab === cat.key }"
                @click="setTab(cat.key)"
            >
                <span x-text="cat.label"></span>
                <span class="badge" x-text="cat.words.length"></span>
            </button>
        </template>
    </div>

    <div x-show="activeCategory">
        <div class="category-title" x-text="activeCategory?.label"></div>
        <div class="category-subtitle" x-text="activeCategory?.words.length + ' mots'"></div>
    </div>

    <div class="word-grid">
        <template x-for="(word, i) in filteredWords" :key="i">
            <div
                class="word-card"
                :class="{ highlight: search.trim().length > 0 }"
                x-text="word"
            ></div>
        </template>
        <div class="empty-state" x-show="filteredWords.length === 0">
            Aucun mot trouvé pour "<span x-text="search"></span>"
        </div>
    </div>

</body>
</html>
